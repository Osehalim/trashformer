# Trashformer Robot - Default Configuration
# All servos are POSITION servos
# Elbow servo is INVERTED (increasing pulse turns it the wrong way)

# ============================================================================
# Robot Identity
# ============================================================================
robot:
  name: "Trashformer"
  version: "1.0.0"
  description: "Autonomous trash collection robot"

# ============================================================================
# Hardware Configuration
# ============================================================================
hardware:
  # Serial communication settings
  serial_port: "/dev/ttyUSB0"
  baud_rate: 115200
  timeout: 1.0
  
  # I2C settings for PCA9685
  i2c_bus: 1
  i2c_address: 0x40  # Default PCA9685 address

# ============================================================================
# Arm Configuration (3-Servo Arm via PCA9685 - ALL POSITION SERVOS)
# ============================================================================
arm:
  # PCA9685 settings
  i2c_address: 0x40
  pwm_frequency: 50  # 50Hz for servos

  # Servo channel assignments
  # NOTE: arm_controller reads these from arm.servo_channels.*
  servo_channels:
    shoulder: 0
    elbow: 1
    gripper: 2

  # Angle limits per servo
  # NOTE: arm_controller reads these from arm.angle_limits.*
  angle_limits:
    shoulder:
      min: 0       # 0° = arm hanging straight down (rest)
      max: 180     # 180° = full range (90° left = 500µs, 90° right = 2500µs)
      home: 0      # Start with arm pointing down

    elbow:
      min: 0       # 0° = center/forward (1000µs)
      max: 100     # 100° = full operating stroke (2000µs), matches spec sheet
      home: 0      # Start at center

    gripper:
      min: 0       # 0° = open (500µs)
      max: 90      # 90° = closed
      home: 0      # Start open

  # Per-servo pulse width calibration
  # Shoulder: Hwünder LD-60MG (or equivalent 180° servo)
  #   Mounted HORIZONTALLY. Arm hangs vertically at rest.
  #   500µs  = 90° left  (logical 0°  if you want left as min)
  #   1500µs = center     (logical 90° = arm pointing straight down = home)
  #   2500µs = 90° right  (logical 180°)
  #   We map logical 0°=500µs ... 180°=2500µs across the full range.
  #   Set home_angle=90 so home() positions arm straight down.
  pwm_limits:
    min_pulse: 500
    max_pulse: 2500

  shoulder:
    min_pulse: 500     # 500µs  = logical 0°  (arm swung fully one way)
    max_pulse: 2500    # 2500µs = logical 180° (arm swung fully other way)
    # home is 90° logical = 1500µs = arm hanging straight down
    # (arm_controller will read home from angle_limits.shoulder.home,
    #  but we override home_angle in ArmController constructor — see note)

  # Elbow: LD-60MG or similar
  #   Operating stroke: 100° (1000µs → 2000µs), neutral at 1500µs
  #   Full range (max stroke): ~130° (900µs → 2100µs)
  #   We use the operating stroke only: 1000→2000µs = 0°→100°
  elbow:
    min_pulse: 1000    # 1000µs = 0° (center/forward)
    max_pulse: 2000    # 2000µs = 100° (full operating stroke)

  # Gripper: standard 180° servo (500–2500µs)
  gripper:
    min_pulse: 500     # 500µs  = 0°  (open)
    max_pulse: 2500    # 2500µs = 180° (but we only use up to 90° = closed)

  # Movement settings
  movement:
    default_speed: 50     # degrees/second
    max_speed: 100        # degrees/second
    smooth_steps: 10      # interpolation steps per second
  
  # Physical dimensions (meters)
  dimensions:
    shoulder_length: 0.15
    forearm_length: 0.12
    gripper_length: 0.05
  
  # Safety limits
  safety:
    max_reach: 0.30
    min_ground_clearance: 0.05

# ============================================================================
# Drive System Configuration
# ============================================================================
drive:
  motor_controller:
    mode: "usb"
    use_usb: true
    left_port: "auto"   # Auto-detect
    right_port: "auto"  # Auto-detect
    baudrate: 38400
    left_address: 0x80
    right_address: 0x80
  
  wheel_diameter: 0.15
  track_width: 0.30
  
  max_linear_speed: 1.5
  max_angular_speed: 2.0
  
  pid:
    kp: 1.0
    ki: 0.1
    kd: 0.05

# ============================================================================
# Camera Configuration
# ============================================================================
camera:
  device: 0
  width: 640
  height: 480
  fps: 30
  
  use_calibration: true
  calibration_file: "data/calibration/camera_params.json"

# ============================================================================
# Vision Processing
# ============================================================================
vision:
  detection:
    model_path: "models/trash_detector.pth"
    confidence_threshold: 0.7
    nms_threshold: 0.4
    input_size: [640, 640]
  
  segmentation:
    model_path: "models/segmentation_model.onnx"
    enabled: false
  
  tracking:
    max_age: 30
    min_hits: 3
    iou_threshold: 0.3

# ============================================================================
# Sensor Configuration
# ============================================================================
sensors:
  imu:
    enabled: true
    update_rate: 100
    calibration_file: "data/calibration/imu_offsets.json"
  
  ultrasonic:
    enabled: true
    update_rate: 10
    max_range: 4.0
    min_range: 0.02
  
  tof:
    enabled: true
    update_rate: 20
    sensor_type: "VL53L1X"
    i2c_address: 0x29
  
    scan_enabled: true
    scan_servo_channel: 3
    scan_range: [-90, 90]
    scan_step: 10
  
    min_distance: 0.1
    max_distance: 2.0
  
  limit_switches:
    enabled: true
    debounce_time: 0.05
  
  fusion:
    enabled: true
    filter_type: "kalman"

# ============================================================================
# Safety System
# ============================================================================
safety:
  emergency_stop:
    enabled: true
    pin: 17
    active_low: true
  
  collision:
    enabled: true
    stop_distance: 0.2
    warning_distance: 0.5
  
  tilt:
    max_angle: 30
    shutdown_angle: 45
  
  watchdog:
    enabled: true
    timeout: 5.0
    check_interval: 1.0

# ============================================================================
# Behavior System
# ============================================================================
behavior:
  default_state: "idle"
  
  autonomous:
    search_pattern: "spiral"
    pickup_distance: 0.3
    approach_speed: 0.3
  
  navigation:
    goal_tolerance: 0.1
    rotation_tolerance: 0.1
    planning_rate: 10

# ============================================================================
# Teleoperation
# ============================================================================
teleop:
  keyboard:
    enabled: true
    linear_speed_step: 0.1
    angular_speed_step: 0.2
  
  gamepad:
    enabled: true
    device_index: 0
    deadzone: 0.1
    max_linear_speed: 0.8
    max_angular_speed: 1.5
  
  arm_control:
    joint_step: 5
    speed_multiplier: 1.0

# ============================================================================
# Logging Configuration
# ============================================================================
logging:
  level: "INFO"
  console: true
  file: true
  log_directory: "logs"
  
  modules:
    arm: "DEBUG"
    vision: "INFO"
    drive: "INFO"
    sensors: "WARNING"

# ============================================================================
# Performance Tuning
# ============================================================================
performance:
  main_loop_rate: 50
  sensor_loop_rate: 100
  vision_loop_rate: 30
  
  use_multithreading: true
  thread_priorities:
    safety: 10
    sensors: 8
    control: 6
    vision: 4
    logging: 2

# ============================================================================
# Data Recording
# ============================================================================
recording:
  enabled: false
  directory: "data/recordings"
  
  record:
    sensor_data: true
    camera_feed: false
    commands: true
    state: true
  
  format: "csv"
  compression: true